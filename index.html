<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Shop</title>
</head>
<body>
  <div id="main">
    <h1>Онлайн магазин</h1>
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="">
    <p>Добро пожаловать в наш онлайн-магазин. Здесь ты найдёшь всё необходимое для повседневной жизни. Мы предлагаем
    качественные товары по доступным ценам. Быстрая доставка и удобный сервис помогут тебе сэкономить время.
    </p>
    <button id="buy">Купить</button>
  </div>

  <form id="form">
    <input type="text" placeholder="Имя" id="user_name">
    <input type="text" placeholder="Email" id="user_email">
    <input type="text" placeholder="Телефон" id="user_phone">
    <button id="order">Оформить</button>
  </form>


  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <script>
    let tg = window.Telegram.WebApp;
    let buy = document.getElementById('buy');
    let order = document.getElementById('order');
    tg.expand();

    buy.addEventListener("click", () => {
      document.getElementById("main").style.display = "none";
      document.getElementById("form").style.display = "block";
      document.getElementById("user_name").value = tg.initDataUnsafe.user.first_name + " " + tg.initDataUnsafe.user.last_name;
    });

    order.addEventListener("click", () => {
      let name = getElementById("user_name").value;
      let email = getElementById("user_email").value;
      let phone = getElementById("phone").value;

      let data = {
        name: name,
        email: email,
        phone: phone
      };
      tg.sendData(JSON,stringify(data));

      tg.close();
    });

  </script>
</body>
</html>
